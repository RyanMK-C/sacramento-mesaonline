<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/ficha.css">
</head>

<body>

<div class="sheet">

<div class="nome">
<label>Nome</label>
<input id="nome">
</div>

<div class="atributos">

<div class="attr">
<label>Velocidade</label>
<input id="velocidade" type="number">
</div>

<div class="attr">
<label>Coragem</label>
<input id="coragem" type="number">
</div>

<div class="attr">
<label>Intelecto</label>
<input id="intelecto" type="number">
</div>

<div class="attr">
<label>Físico</label>
<input id="fisico" type="number">
</div>

</div>

<div class="vida">
<label>Vida</label>
<div class="circulos" id="vida"></div>
</div>

<div class="dor">
<label>Dor</label>
<div class="circulos" id="dor"></div>
</div>

<div class="habilidades">

<div class="skill"><label>Tensão</label><input id="tensao"></div>
<div class="skill"><label>Medicina</label><input id="medicina"></div>
<div class="skill"><label>Montaria</label><input id="montaria"></div>
<div class="skill"><label>Tradição</label><input id="tradicao"></div>
<div class="skill"><label>Violência</label><input id="violencia"></div>
<div class="skill"><label>Negócios</label><input id="negocios"></div>
<div class="skill"><label>Roubo</label><input id="roubo"></div>
<div class="skill"><label>Suor</label><input id="suor"></div>

</div>

<div class="botoes">

<button id="exportar">Exportar</button>
<input type="file" id="importar">

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="js/ficha.js"></script>

</body>
</html>
