<!DOCTYPE html>
<html>
<head>
<title>Ficha</title>
<script src="/socket.io/socket.io.js"></script>
</head>

<body>

<h2 id="nome"></h2>

Vida:
<input id="vida" type="number">

Dor:
<input id="dor" type="number">

Defesa:
<input id="defesa" type="number">

Velocidade:
<input id="velocidade" type="number">

Coragem:
<input id="coragem" type="number">

Intelecto:
<input id="intelecto" type="number">

Fisico:
<input id="fisico" type="number">

<button onclick="salvar()">Salvar</button>

<script>

const socket = io()

const params = new URLSearchParams(window.location.search)
const player = params.get("player")

document.getElementById("nome").innerText = player

function salvar(){

const data = {
id: player,
vida: document.getElementById("vida").value,
dor: document.getElementById("dor").value,
defesa: document.getElementById("defesa").value,
velocidade: document.getElementById("velocidade").value,
coragem: document.getElementById("coragem").value,
intelecto: document.getElementById("intelecto").value,
fisico: document.getElementById("fisico").value
}

socket.emit("updateFicha", data)

}

socket.on("fichaAtualizada", data => {

if(data.id === player){

document.getElementById("vida").value = data.vida
document.getElementById("dor").value = data.dor

}

})

</script>

</body>
</html>
